<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2D Guitar Fretboard Practice Tool</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
  <h1>Interactive Guitar Fretboard</h1>

  <div class="container">
    <div class="controls-grid">
      <div class="control-group">
        <label for="key-select">Key</label>
        <select id="key-select"></select>
      </div>

      <div class="control-group">
        <label for="mode-select">Mode Type</label>
        <select id="mode-select">
          <option value="scales">Scales</option>
          <option value="chords">Chords</option>
        </select>
      </div>

      <div class="control-group">
        <label for="type-select">Collection</label>
        <select id="type-select"></select>
      </div>

      <!-- Clean Multi-Select Dropdown Fix (Size attribute removed) -->
    <div class="control-group">
  <label>CAGED Patterns</label>
  <div class="custom-multiselect">
    <div class="select-box" id="caged-dropdown-toggle">
      <span id="dropdown-label-text">Full Fretboard</span>
      <span class="arrow">▼</span>
    </div>
    <div class="checkboxes-wrapper" id="caged-checkboxes-container">
      <label class="checkbox-item">
        <input type="checkbox" value="all" checked /> 
        <span>Full Fretboard</span>
      </label>
      <label class="checkbox-item">
        <input type="checkbox" value="caged_1" /> 
        <span>Pattern 1 (G/Em Shape)</span>
      </label>
      <label class="checkbox-item">
        <input type="checkbox" value="caged_2" /> 
        <span>Pattern 2 (E/Dm Shape)</span>
      </label>
      <label class="checkbox-item">
        <input type="checkbox" value="caged_3" /> 
        <span>Pattern 3 (D/Cm Shape)</span>
      </label>
      <label class="checkbox-item">
        <input type="checkbox" value="caged_4" /> 
        <span>Pattern 4 (C/Am Shape)</span>
      </label>
      <label class="checkbox-item">
        <input type="checkbox" value="caged_5" /> 
        <span>Pattern 5 (A/Gm Shape)</span>
      </label>
    </div>
  </div>
</div>


      <div class="control-group">
        <label for="display-mode">Note Display</label>
        <select id="display-mode">
          <option value="names"> Names (C, D, E)</option>
          <option value="intervals">Interval (1, 2, 3)</option>
          <option value="combined">Combined (C1)</option>
        </select>
      </div>

      <div class="control-group">
        <label for="shape-select">Marker Shape</label>
        <select id="shape-select">
          <option value="shape-circle">Circle / Round</option>
          <option value="shape-square">Square</option>
          <option value="shape-rounded">Rounded Square</option>
        </select>
      </div>

      <div class="control-group">
        <label for="font-color-picker">Text</label>
        <input type="color" id="font-color-picker" value="#ffffff">
      </div>

      <div class="control-group">
        <label for="board-color-picker">Fret</label>
        <input type="color" id="board-color-picker" value="#2e2e3e">
      </div>

      <div class="control-group toggle-container" style="padding-top: 5px;">
        <label for="visibility-toggle"> All Notes Toggle</label>
        <input type="checkbox" id="visibility-toggle" checked style="width: 20px; height: 20px; cursor:pointer;">
      </div>
    </div>

    <div class="color-mapper">
      <label>Interval Degree Color Assignments</label>
      <div class="color-pickers">
        <div class="picker-item"><span>1 (Root)</span><input type="color" id="col-1" value="#ef4444"></div>
        <div class="picker-item"><span>2nd</span><input type="color" id="col-2" value="#f97316"></div>
        <div class="picker-item"><span>3rd</span><input type="color" id="col-3" value="#eab308"></div>
        <div class="picker-item"><span>4th</span><input type="color" id="col-4" value="#06b6d4"></div>
        <div class="picker-item"><span>5th</span><input type="color" id="col-5" value="#3b82f6"></div>
        <div class="picker-item"><span>6th</span><input type="color" id="col-6" value="#a855f7"></div>
        <div class="picker-item"><span>7th</span><input type="color" id="col-7" value="#ec4899"></div>
      </div>
      <button class="action-btn" id="save-settings-btn">Save Settings & Colors</button>
    </div>

    <div class="fretboard-wrapper">
      <div class="fretboard-grid" id="fretboard-canvas"></div>
      <div class="numbers-row" id="fret-numbers-line"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
